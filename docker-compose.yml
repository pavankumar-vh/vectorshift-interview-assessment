version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: vectorshift
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/vectorshift
      SECRET_KEY: dev_secret_change_me
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
