services:
  - type: web
    name: vectorshift-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://vectorshift-interview-assessment.vercel.app,http://localhost:3000
      - key: DATABASE_URL
        sync: false
