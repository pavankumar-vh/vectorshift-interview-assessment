services:
  - type: web
    name: vectorshift-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: vectorshift-db
          property: connectionString

databases:
  - name: vectorshift-db
    databaseName: vectorshift
    user: vectorshift
